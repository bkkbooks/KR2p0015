body:
  text: 馬王堆漢墓帛書合陰陽釋文凡將合陰陽之方握手出捾陽揗𢩭房抵夜旁上竈綱抵領鄉揗拯匡覆周環下缺盆過醴津陵勃海上常山入玄門御交筋上欱精神乃能久視而與天地牟存交筋者玄門中交脈也為得操揗之使𦡊皆樂養說澤以好雖欲勿為作相呴相抱以次戲道戲道一曰氣上面埶徐呴二曰乳堅鼻汗徐抱三曰舌溥而滑徐屯四曰下汐股濕徐操五曰嗌乾咽唾徐㨔此胃五欲之徵徵備乃上上揕而勿內以致其氣氣至深內而上撅之以抒其熱因復下反之毋使其氣歇而女乃大竭然後熱十動接十莭雜十脩接刑已沒遂氣宗門乃觀八動聽五音察十已之徵十動始十次廿卅𠦜五十六十七十八十九十百出入而毋决瀉一動毋决耳目葱明再而音聲章三而皮革光四而脊脅強五而尻脾方六而水道行七而至堅以強八而奏理光九而通神明十而為身常此胃十動十一曰虎游二曰蟬柎三曰斥蠖四曰囷桷五曰蝗磔六曰爰據踞七曰瞻諸八曰兔騖九曰青令十曰魚嘬十脩一曰上之二曰下之三曰左之四曰右之五曰疾之六曰徐之七曰希之八曰數之九曰淺之十曰深之八動一曰接手二曰信𢩭三曰直踵四曰側句五曰上句六曰交股七曰平甬八曰振動夫接手者欲腹之傅也信𢩭者欲上之攠且距也直踵者深不及也側句者旁欲攠也上句者欲下攠也交股者夾大過也平甬者欲淺也振動者欲人久持之也瘛息者內急也息至美也絫者玉莢入而養乃始也者鹽甘甚也齧者身振動欲人之久也昏者男之精將早者女之精責吾精以養女精前脈皆動皮膚氣血皆作故能發閉通塞中府受輸而盈十已之徵一已而清凉出再已而臭如燔骨三已而澡四已而膏五已而薌六已而滑七已而八已而脂九已而膠十已而𦃈𦃈已復滑清凉復出是胃大卒大卒之徵鼻汗脣白手足皆作尻不傅席起而去成死為薄當此之時中極氣張精神入臧乃生神明
